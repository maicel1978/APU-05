<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>APU-05 | Suite de Pruebas de Rigor</title>
    <style>
        body { font-family: ui-monospace, monospace; padding: 2rem; background: #f8fafc; }
        .test-case { padding: 0.5rem; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; }
        .pass { color: green; }
        .fail { color: red; font-weight: bold; }
        .summary { margin-top: 2rem; padding: 1rem; border-top: 2px solid #000; }
        h1 { border-bottom: 2px solid #000; padding-bottom: 0.5rem; }
    </style>
</head>
<body>
    <h1>🧪 APU-05 Test Runner</h1>
    <div id="results"></div>
    <div id="summary" class="summary"></div>

    <script type="module">
        import { runTests as runParserTests } from './Parser.test.js';
        import { runStatsTests } from './Stats.test.js';

        const resultsContainer = document.getElementById('results');
        const summaryContainer = document.getElementById('summary');

        const logger = {
            log: (name, passed, error) => {
                const div = document.createElement('div');
                div.className = 'test-case';
                div.innerHTML = `
                    <span>${name}</span>
                    <span class="${passed ? 'pass' : 'fail'}">${passed ? 'PASSED' : 'FAILED: ' + error}</span>
                `;
                resultsContainer.appendChild(div);
            }
        };

        (async () => {
            const parserStats = await runParserTests(logger);
            const statsResults = await runStatsTests(logger);
            
            const totalPassed = parserStats.passed + statsResults.passed;
            const totalTests = parserStats.total + statsResults.total;

            summaryContainer.innerHTML = `
                <strong>RESULTADO FINAL:</strong> ${totalPassed} / ${totalTests} pruebas superadas.
            `;
        })();
    </script>
</body>
</html>
